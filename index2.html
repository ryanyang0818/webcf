<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>表單資料2</title>
  <style>
    body { font-family: sans-serif; padding: 24px; }
    table { border-collapse: collapse; width: 100%; }
    th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
    th { background: #f5f5f5; font-weight: 600; }
    tr:nth-child(even) { background: #fafafa; }
    #status { color: #888; font-size: 14px; margin-bottom: 12px; }
  </style>
</head>
<body>

<h2>Google 表單回應</h2>
<div id="status">載入中...</div>
<div id="table-wrap"></div>

<script>
<!-- const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaEiRaUI5yqpD6dAxr7WWUoesbtK5V-ilqyypSsbP9CYzKgVu04kfkyNZTwOwLg5Gl_w/exec'; -->
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxaEiRaUI5yqpD6dAxr7WWUoesbtK5V-ilqyypSsbP9CYzKgVu04kfkyNZTwOwLg5Gl_w/exec';

fetch(SCRIPT_URL)
  .then(res => res.json())
  .then(data => {
    document.getElementById('status').textContent =
      `共 ${data.length} 筆資料`;

    if (!data.length) return;

    const headers = Object.keys(data[0]);
    let html = '<table><thead><tr>';
    headers.forEach(h => html += `<th>${h}</th>`);
    html += '</tr></thead><tbody>';

    data.forEach(row => {
      html += '<tr>';
      headers.forEach(h => html += `<td>${row[h] ?? ''}</td>`);
      html += '</tr>';
    });

    html += '</tbody></table>';
    document.getElementById('table-wrap').innerHTML = html;
  })
  .catch(err => {
    document.getElementById('status').textContent = '載入失敗：' + err;
  });
</script>

</body>
</html>
